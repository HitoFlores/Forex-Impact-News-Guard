name: sync-and-publish

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: forex-guard-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run once
        env:
          FOREX_GUARD_TELEGRAM_BOT_TOKEN: ${{ secrets.FOREX_GUARD_TELEGRAM_BOT_TOKEN }}
          FOREX_GUARD_TELEGRAM_CHAT_ID: ${{ secrets.FOREX_GUARD_TELEGRAM_CHAT_ID }}
        run: python -m forex_news_guard.worker

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .state
          if git diff --cached --quiet; then
            echo "No state changes"
          else
            git commit -m "chore: update state [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
