name: keepalive

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Touch keepalive state
        run: |
          python - <<'PY'
          from datetime import datetime, timezone
          from pathlib import Path
          import json

          state_dir = Path(".state")
          state_dir.mkdir(exist_ok=True)
          payload = {
              "updated_at": datetime.now(timezone.utc).isoformat(),
          }
          (state_dir / "keepalive.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          PY

      - name: Commit keepalive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .state/keepalive.json
          if git diff --cached --quiet; then
            echo "No keepalive changes"
          else
            git commit -m "chore: keepalive [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
