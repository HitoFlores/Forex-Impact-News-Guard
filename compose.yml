services:
  api:
    build:
      context: .
    command: ["uvicorn", "forex_news_guard.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./.state:/app/.state

  worker:
    build:
      context: .
    command: ["python", "-m", "forex_news_guard.worker"]
    depends_on:
      api:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./.state:/app/.state
